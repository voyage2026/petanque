<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournoi Pétanque — Championnat Suisse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5EFE0;
    --sand-dark: #E8DECA;
    --clay: #C4622D;
    --clay-light: #E8855A;
    --clay-dark: #8F3E17;
    --olive: #6B7C3F;
    --olive-light: #8FA050;
    --ink: #2A2218;
    --ink-light: #5C4F3A;
    --cream: #FDFAF4;
    --gold: #C89B3C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Texture de fond */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C4622D' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='3'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; position: relative; z-index: 1; }

  /* Header */
  header { text-align: center; margin-bottom: 3rem; }
  .header-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--clay);
    border: 1.5px solid var(--clay);
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  header h1 span { color: var(--clay); }
  header p { font-size: 15px; color: var(--ink-light); }

  /* Boules décoratives */
  .boules {
    display: flex; justify-content: center; gap: 8px; margin: 1.2rem 0;
  }
  .boule {
    width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--clay-light), var(--clay-dark));
    box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.15);
  }
  .boule.olive { background: radial-gradient(circle at 35% 35%, var(--olive-light), #3d4a1f); }
  .boule.gold { background: radial-gradient(circle at 35% 35%, #e8c062, #8a6520); }

  /* Sections */
  .section {
    background: var(--cream);
    border-radius: 16px;
    border: 1px solid var(--sand-dark);
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 0 var(--sand-dark);
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 6px; height: 22px;
    background: var(--clay);
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Config */
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width: 500px) { .config-grid { grid-template-columns: 1fr; } }

  label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); display: block; margin-bottom: 6px; }
  input[type=number], select {
    width: 100%; padding: 10px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; color: var(--ink);
    background: var(--sand); border: 1.5px solid var(--sand-dark);
    border-radius: 10px; outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type=number]:focus, select:focus { border-color: var(--clay); }

  /* Ajout équipes */
  .add-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .add-row input[type=text] {
    flex: 1; padding: 10px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; color: var(--ink); background: var(--sand);
    border: 1.5px solid var(--sand-dark); border-radius: 10px; outline: none;
    transition: border-color 0.2s;
  }
  .add-row input[type=text]:focus { border-color: var(--clay); }
  .add-row input[type=text]::placeholder { color: #b5a98a; }

  .btn {
    padding: 10px 20px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .btn-primary { background: var(--clay); color: #fff; }
  .btn-primary:hover { background: var(--clay-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary { background: var(--sand); color: var(--ink-light); border: 1.5px solid var(--sand-dark); }
  .btn-secondary:hover { border-color: var(--clay); color: var(--clay); }
  .btn-olive { background: var(--olive); color: #fff; }
  .btn-olive:hover { background: #4e5c2e; }
  .btn-full { width: 100%; padding: 14px; font-size: 15px; }

  /* Liste équipes */
  .team-list { display: flex; flex-direction: column; gap: 6px; }
  .team-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--sand); border-radius: 10px; padding: 9px 12px;
    border: 1px solid var(--sand-dark); animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .team-num {
    width: 26px; height: 26px; border-radius: 50%; background: var(--clay);
    color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .team-name { flex: 1; font-weight: 500; font-size: 14px; }
  .team-del {
    width: 26px; height: 26px; border-radius: 50%; background: transparent;
    border: none; cursor: pointer; color: #c4a882; font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center; transition: color 0.15s;
  }
  .team-del:hover { color: var(--clay); }

  .team-count {
    font-size: 12px; color: var(--ink-light); text-align: right; margin-top: 8px;
  }
  .team-count b { color: var(--clay); }

  /* Navigation tours */
  .tour-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tour-tab {
    padding: 7px 18px; border-radius: 100px; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--sand-dark); background: var(--cream); color: var(--ink-light); cursor: pointer; transition: all 0.18s;
  }
  .tour-tab:hover:not(:disabled) { border-color: var(--clay); color: var(--clay); }
  .tour-tab.active { background: var(--clay); color: #fff; border-color: var(--clay); }
  .tour-tab.done { border-color: var(--olive); color: var(--olive); }
  .tour-tab:disabled { opacity: 0.4; cursor: default; }
  .tour-tab.classement-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }

  /* Matchs */
  .match-list { display: flex; flex-direction: column; gap: 8px; }
  .match-card {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px;
    background: var(--sand); border-radius: 12px; padding: 12px 16px;
    border: 1px solid var(--sand-dark);
  }
  .match-team { font-weight: 600; font-size: 14px; color: var(--ink); }
  .match-team.right { text-align: right; }
  .match-exempt { font-size: 13px; color: var(--ink-light); font-style: italic; text-align: right; }
  .match-score { display: flex; align-items: center; gap: 6px; justify-content: center; }
  .score-box {
    width: 44px; height: 38px; text-align: center; font-size: 18px; font-weight: 700;
    color: var(--clay-dark); background: var(--cream); border: 1.5px solid var(--sand-dark);
    border-radius: 8px; outline: none; font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
    -webkit-appearance: none; -moz-appearance: textfield;
  }
  .score-box:focus { border-color: var(--clay); }
  .score-box::-webkit-inner-spin-button { display: none; }
  .score-sep { font-size: 16px; font-weight: 700; color: var(--ink-light); }
  .match-winner-a { border-left: 3px solid var(--olive); }
  .match-winner-b { border-right: 3px solid var(--olive); }

  /* Classement */
  .ranking-table { width: 100%; border-collapse: collapse; }
  .ranking-table th {
    text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light);
    border-bottom: 1.5px solid var(--sand-dark);
  }
  .ranking-table th.center { text-align: center; }
  .ranking-table td { padding: 10px 12px; border-bottom: 1px solid var(--sand-dark); font-size: 14px; }
  .ranking-table td.center { text-align: center; }
  .ranking-table tr:last-child td { border-bottom: none; }
  .ranking-table tr:hover td { background: var(--sand); }
  .rank-medal { font-size: 18px; }
  .rank-num { font-size: 13px; font-weight: 600; color: var(--ink-light); }
  .rank-name { font-weight: 600; }
  .rank-vic { font-weight: 700; color: var(--clay); font-size: 15px; }
  .rank-diff { font-size: 13px; color: var(--ink-light); }
  .rank-diff.pos { color: var(--olive); }
  .rank-diff.neg { color: var(--clay); }
  .podium-row-0 td { background: linear-gradient(90deg, rgba(200,155,60,0.08), transparent); }
  .podium-row-1 td { background: linear-gradient(90deg, rgba(140,140,140,0.07), transparent); }
  .podium-row-2 td { background: linear-gradient(90deg, rgba(196,98,45,0.07), transparent); }

  /* Messages état */
  .empty-state {
    text-align: center; padding: 2rem; color: var(--ink-light); font-size: 14px;
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 8px; }

  .info-bar {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem;
  }
  .info-pill {
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    background: var(--sand); border: 1px solid var(--sand-dark);
    color: var(--ink-light); padding: 4px 12px; border-radius: 100px;
  }
  .info-pill b { color: var(--clay); }

  .divider { height: 1px; background: var(--sand-dark); margin: 1.25rem 0; }

  .actions-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }

  .alert {
    background: #fef9ed; border: 1px solid #e8c76a; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: #7a5f10; margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-badge">Tournoi Pétanque</div>
    <h1>Championnat <span>Suisse</span></h1>
    <div class="boules">
      <div class="boule"></div><div class="boule olive"></div><div class="boule gold"></div>
      <div class="boule"></div><div class="boule olive"></div>
    </div>
    <p>Tout le monde joue · Doublettes · 11 points</p>
  </header>

  <!-- ÉTAPE 1 : Configuration -->
  <div class="section" id="sectionConfig">
    <div class="section-title">Configuration</div>
    <div class="config-grid">
      <div>
        <label>Nombre de tours</label>
        <select id="nbTours">
          <option value="3">3 tours (~2h)</option>
          <option value="4" selected>4 tours (~2h30)</option>
          <option value="5">5 tours (~3h)</option>
          <option value="6">6 tours (~3h30)</option>
        </select>
      </div>
      <div>
        <label>Points par match</label>
        <select id="nbPoints">
          <option value="11" selected>11 points (rapide)</option>
          <option value="13">13 points (standard)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ÉTAPE 2 : Équipes -->
  <div class="section" id="sectionEquipes">
    <div class="section-title">Équipes</div>
    <div class="add-row">
      <input type="text" id="inputEquipe" placeholder="Nom de l'équipe (ex: Les Durands)" maxlength="40" />
      <button class="btn btn-primary" onclick="addEquipe()">Ajouter</button>
    </div>
    <div class="team-list" id="teamList"></div>
    <div class="team-count" id="teamCount"></div>
    <div class="divider"></div>
    <button class="btn btn-olive btn-full" id="btnStart" onclick="startTournoi()" disabled>
      Lancer le tournoi →
    </button>
  </div>

  <!-- ÉTAPE 3 : Tournoi -->
  <div class="section" id="sectionTournoi" style="display:none;">
    <div class="section-title" id="tournoiTitle">Tournoi en cours</div>
    <div class="info-bar" id="infoBar"></div>
    <div class="tour-nav" id="tourNav"></div>
    <div id="tourContent"></div>
  </div>

</div>

<script>
const state = {
  equipes: [],
  nbTours: 4,
  nbPoints: 11,
  tours: [],
  scores: {},
  currentView: 'tour',
  currentTour: 0,
  started: false
};

// --- GESTION ÉQUIPES ---

document.getElementById('inputEquipe').addEventListener('keydown', e => {
  if (e.key === 'Enter') addEquipe();
});

function addEquipe() {
  const input = document.getElementById('inputEquipe');
  const nom = input.value.trim();
  if (!nom) return;
  if (state.equipes.includes(nom)) { input.style.borderColor = 'var(--clay)'; setTimeout(() => input.style.borderColor = '', 1000); return; }
  state.equipes.push(nom);
  input.value = '';
  input.focus();
  renderEquipes();
}

function removeEquipe(i) {
  if (state.started) return;
  state.equipes.splice(i, 1);
  renderEquipes();
}

function renderEquipes() {
  const list = document.getElementById('teamList');
  const count = document.getElementById('teamCount');
  const btn = document.getElementById('btnStart');
  list.innerHTML = state.equipes.map((e, i) => `
    <div class="team-item">
      <div class="team-num">${i+1}</div>
      <div class="team-name">${e}</div>
      <button class="team-del" onclick="removeEquipe(${i})" title="Supprimer">×</button>
    </div>
  `).join('');
  const n = state.equipes.length;
  count.innerHTML = n === 0 ? '' : `<b>${n}</b> équipe${n>1?'s':''} — ${Math.floor(n/2)} match${Math.floor(n/2)>1?'s':''} par tour${n%2===1?' (1 équipe exemptée par tour)':''}`;
  btn.disabled = n < 4;
}

// --- LANCEMENT ---

function startTournoi() {
  state.nbTours = parseInt(document.getElementById('nbTours').value);
  state.nbPoints = parseInt(document.getElementById('nbPoints').value);
  state.tours = [];
  state.scores = {};
  state.started = true;

  // Désactiver la saisie équipes
  document.getElementById('sectionEquipes').querySelectorAll('button, input').forEach(el => el.disabled = true);
  document.getElementById('sectionConfig').querySelectorAll('select').forEach(el => el.disabled = true);

  state.tours.push(genTour(0));

  document.getElementById('sectionTournoi').style.display = '';
  document.getElementById('sectionTournoi').scrollIntoView({ behavior: 'smooth' });

  state.currentTour = 0;
  state.currentView = 'tour';
  renderTournoi();
}

// --- GÉNÉRATION TOURS ---

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getClassement() {
  const stats = {};
  state.equipes.forEach(e => stats[e] = { v: 0, pp: 0, pc: 0 });
  for (let t = 0; t < state.tours.length; t++) {
    state.tours[t].forEach(m => {
      if (m.b === '__exempt__') return;
      const key = `${t}-${m.id}`;
      const s = state.scores[key];
      if (!s || s.a === '' || s.b === '') return;
      const a = parseInt(s.a), b = parseInt(s.b);
      if (isNaN(a) || isNaN(b)) return;
      stats[m.a].pp += a; stats[m.a].pc += b;
      stats[m.b].pp += b; stats[m.b].pc += a;
      if (a > b) stats[m.a].v++;
      else if (b > a) stats[m.b].v++;
    });
  }
  return Object.entries(stats)
    .map(([e, s]) => ({ equipe: e, v: s.v, pp: s.pp, pc: s.pc, diff: s.pp - s.pc }))
    .sort((a, b) => b.v - a.v || b.diff - a.diff || b.pp - a.pp);
}

function genTour(idx) {
  const cl = getClassement().map(c => c.equipe);
  const ordered = idx === 0 ? shuffle(cl) : cl;
  const matches = [];
  const used = new Set();
  let id = 0;

  for (let i = 0; i < ordered.length; i++) {
    if (used.has(ordered[i])) continue;
    let paired = false;
    for (let j = i + 1; j < ordered.length; j++) {
      if (used.has(ordered[j])) continue;
      const alreadyPlayed = state.tours.slice(0, idx).some(t =>
        t.some(m => (m.a === ordered[i] && m.b === ordered[j]) || (m.a === ordered[j] && m.b === ordered[i]))
      );
      if (!alreadyPlayed) {
        matches.push({ id: id++, a: ordered[i], b: ordered[j] });
        used.add(ordered[i]); used.add(ordered[j]);
        paired = true; break;
      }
    }
    if (!paired) {
      for (let j = i + 1; j < ordered.length; j++) {
        if (!used.has(ordered[j])) {
          matches.push({ id: id++, a: ordered[i], b: ordered[j] });
          used.add(ordered[i]); used.add(ordered[j]);
          break;
        }
      }
    }
  }

  const remaining = ordered.filter(e => !used.has(e));
  remaining.forEach(e => matches.push({ id: id++, a: e, b: '__exempt__' }));
  return matches;
}

// --- RENDU ---

function renderTournoi() {
  const title = document.getElementById('tournoiTitle');
  const info = document.getElementById('infoBar');
  const nav = document.getElementById('tourNav');

  title.textContent = state.currentView === 'classement' ? 'Classement général' : `Tour ${state.currentTour + 1} / ${state.nbTours}`;

  info.innerHTML = `
    <div class="info-pill"><b>${state.equipes.length}</b> équipes</div>
    <div class="info-pill"><b>${state.nbTours}</b> tours</div>
    <div class="info-pill"><b>${state.nbPoints}</b> pts par match</div>
  `;

  nav.innerHTML = '';
  for (let i = 0; i < state.tours.length; i++) {
    const btn = document.createElement('button');
    btn.className = 'tour-tab' + (state.currentView === 'tour' && state.currentTour === i ? ' active' : '') + (i < state.currentTour ? ' done' : '');
    btn.textContent = `Tour ${i+1}` + (tourFini(i) ? ' ✓' : '');
    btn.onclick = () => { state.currentView = 'tour'; state.currentTour = i; renderTournoi(); };
    nav.appendChild(btn);
  }

  const clBtn = document.createElement('button');
  clBtn.className = 'tour-tab classement-tab' + (state.currentView === 'classement' ? ' active' : '');
  clBtn.textContent = 'Classement';
  clBtn.onclick = () => { state.currentView = 'classement'; renderTournoi(); };
  nav.appendChild(clBtn);

  if (state.currentView === 'classement') {
    renderClassement();
  } else {
    renderMatchs(state.currentTour);
  }
}

function tourFini(t) {
  return state.tours[t].every(m => {
    if (m.b === '__exempt__') return true;
    const s = state.scores[`${t}-${m.id}`];
    return s && s.a !== '' && s.b !== '' && !isNaN(parseInt(s.a)) && !isNaN(parseInt(s.b));
  });
}

function renderMatchs(t) {
  const content = document.getElementById('tourContent');
  const matches = state.tours[t];
  const pts = state.nbPoints;

  let html = '<div class="match-list">';
  matches.forEach(m => {
    const key = `${t}-${m.id}`;
    const s = state.scores[key] || { a: '', b: '' };
    const va = s.a !== '' && s.b !== '' ? parseInt(s.a) : null;
    const vb = s.b !== '' && s.a !== '' ? parseInt(s.b) : null;
    const winA = va !== null && va > vb;
    const winB = vb !== null && vb > va;

    if (m.b === '__exempt__') {
      html += `<div class="match-card">
        <div class="match-team">${m.a}</div>
        <div style="text-align:center;font-size:12px;color:var(--ink-light);font-style:italic;">exempt</div>
        <div></div>
      </div>`;
    } else {
      html += `<div class="match-card${winA?' match-winner-a':winB?' match-winner-b':''}">
        <div class="match-team${winA?' rank-vic':''}">${m.a}</div>
        <div class="match-score">
          <input class="score-box" type="number" min="0" max="${pts}" value="${s.a}" placeholder="—"
            onchange="saveScore('${key}','a',this.value)" oninput="saveScore('${key}','a',this.value)" />
          <span class="score-sep">–</span>
          <input class="score-box" type="number" min="0" max="${pts}" value="${s.b}" placeholder="—"
            onchange="saveScore('${key}','b',this.value)" oninput="saveScore('${key}','b',this.value)" />
        </div>
        <div class="match-team right${winB?' rank-vic':''}">${m.b}</div>
      </div>`;
    }
  });
  html += '</div>';

  html += '<div class="actions-row">';
  if (t + 1 < state.nbTours) {
    html += `<button class="btn btn-olive" onclick="nextTour(${t})">Générer tour ${t+2} →</button>`;
  } else {
    html += `<button class="btn btn-olive" onclick="() => { state.currentView='classement'; renderTournoi(); }">Voir le classement final →</button>`;
  }
  html += `<button class="btn btn-secondary" onclick="exportTxt()">Exporter les résultats</button>`;
  html += '</div>';

  document.getElementById('tourContent').innerHTML = html;
}

function saveScore(key, side, val) {
  if (!state.scores[key]) state.scores[key] = { a: '', b: '' };
  state.scores[key][side] = val;
  // Mise à jour visuelle du bord gagnant sans re-render complet
  const t = state.currentTour;
  const matchId = key.split('-')[1];
  const m = state.tours[t].find(x => String(x.id) === matchId);
  if (m) {
    const s = state.scores[key];
    const va = s.a !== '' && s.b !== '' ? parseInt(s.a) : null;
    const vb = s.b !== '' && s.a !== '' ? parseInt(s.b) : null;
    const card = document.querySelectorAll('.match-card')[state.tours[t].indexOf(m)];
    if (card) {
      card.classList.remove('match-winner-a', 'match-winner-b');
      if (va !== null && va > vb) card.classList.add('match-winner-a');
      else if (vb !== null && vb > va) card.classList.add('match-winner-b');
    }
  }
}

function nextTour(t) {
  if (state.tours.length <= t + 1) {
    state.tours.push(genTour(t + 1));
  }
  state.currentTour = t + 1;
  state.currentView = 'tour';
  renderTournoi();
  document.getElementById('sectionTournoi').scrollIntoView({ behavior: 'smooth' });
}

function renderClassement() {
  const cl = getClassement();
  const medals = ['🥇','🥈','🥉'];
  let html = `<table class="ranking-table">
    <thead><tr>
      <th>#</th><th>Équipe</th>
      <th class="center">Victoires</th>
      <th class="center">Diff.</th>
      <th class="center">Points marqués</th>
    </tr></thead><tbody>`;
  cl.forEach((row, i) => {
    const diffStr = row.diff > 0 ? `+${row.diff}` : `${row.diff}`;
    const diffClass = row.diff > 0 ? 'pos' : row.diff < 0 ? 'neg' : '';
    html += `<tr class="${i<3?'podium-row-'+i:''}">
      <td>${i < 3 ? `<span class="rank-medal">${medals[i]}</span>` : `<span class="rank-num">${i+1}</span>`}</td>
      <td><span class="rank-name">${row.equipe}</span></td>
      <td class="center"><span class="rank-vic">${row.v}</span></td>
      <td class="center"><span class="rank-diff ${diffClass}">${diffStr}</span></td>
      <td class="center">${row.pp}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  html += '<div class="actions-row"><button class="btn btn-secondary" onclick="exportTxt()">Exporter les résultats</button></div>';
  document.getElementById('tourContent').innerHTML = html;
}

function exportTxt() {
  let txt = '=== TOURNOI PÉTANQUE — CHAMPIONNAT SUISSE ===\n\n';
  txt += `${state.equipes.length} équipes · ${state.nbTours} tours · ${state.nbPoints} points\n\n`;
  state.tours.forEach((tour, t) => {
    txt += `--- TOUR ${t+1} ---\n`;
    tour.forEach(m => {
      if (m.b === '__exempt__') { txt += `  ${m.a} : exempt\n`; return; }
      const s = state.scores[`${t}-${m.id}`] || {};
      txt += `  ${m.a} ${s.a||'?'} - ${s.b||'?'} ${m.b}\n`;
    });
    txt += '\n';
  });
  txt += '--- CLASSEMENT FINAL ---\n';
  const cl = getClassement();
  const medals = ['🥇','🥈','🥉'];
  cl.forEach((row, i) => {
    txt += `  ${medals[i]||`${i+1}.`} ${row.equipe} — ${row.v} victoire${row.v>1?'s':''}, diff. ${row.diff>0?'+':''}${row.diff}\n`;
  });

  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'resultats_petanque.txt';
  a.click();
}

// Init
renderEquipes();
</script>
</body>
</html>
